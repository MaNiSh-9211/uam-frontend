# CDN cache hints for static SPAs behind Cloudflare Free (edge caches on Cache-Control).
# Include inside server {} for demo-frontend / uam-frontend nginx.

location ~* \.(?:css|js|mjs|ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|eot)$ {
    add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800" always;
    add_header CDN-Cache-Control "max-age=86400" always;
    try_files $uri =404;
}

location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header CDN-Cache-Control "max-age=31536000" always;
    try_files $uri =404;
}

# HTML shell: short TTL so deploys propagate quickly
location ~* \.html$ {
    add_header Cache-Control "public, max-age=300, must-revalidate" always;
    add_header CDN-Cache-Control "max-age=300" always;
}
